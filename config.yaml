nas:
  mount_point: "./test_photos"

display:
  fit_mode: "fit"
  background: "blur"
  transition: "fade"
  transition_duration_secs: 1.5
  interval_secs: 30
  shuffle: true
  show_info_overlay: false

schedule:
  night_mode:
    enabled: true
    start: "21:00"
    end: "06:00"
    brightness: 0.3
  power_save:
    enabled: true
    start: "23:00"
    end: "07:00"

history:
  enabled: true
  max_entries: 500
  allow_rating_changes: true

playlists:
  all:
    name: "All Photos"
    filter: {}

  favorites:
    name: "Favorites (4+ stars)"
    filter:
      rating: { gte: 4 }
    fit_mode: "ken_burns"

  family:
    name: "Family Photos"
    filter:
      people: { any: ["Alice", "Bob", "Charlie"] }

  vacation:
    name: "Vacation"
    filter:
      keywords: { any: ["vacation", "travel"] }

  best-of-kids:
    name: "Best Kid Photos"
    filter:
      rating: { gte: 3 }
      people: { any: ["Alice", "Bob"] }
